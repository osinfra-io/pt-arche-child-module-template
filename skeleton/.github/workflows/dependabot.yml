name: Dependabot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Dependabot
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/dependabot.yml@9c0da8a98a2844d9197de062f22247c677f6f1ee  # v0.2.5
    if: github.actor == 'dependabot[bot]'
    secrets:
      dependabot_token: ${{ secrets.DEPENDABOT_TOKEN }}
