name: Dependabot

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Dependabot
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/dependabot.yml@7ed8c49dde7d72864db8b10423592c85fc30df80  # v0.2.3
    if: github.actor == 'dependabot[bot]'
    secrets:
      dependabot_token: ${{ secrets.DEPENDABOT_TOKEN }}
